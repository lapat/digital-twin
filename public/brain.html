<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Digital Twin — Brain Test</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: #0a0a0f; color: #e8e8f0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100vh; height: 100dvh; display: flex; flex-direction: column;
    overflow-x: hidden;
  }
  header {
    padding: 12px 16px; background: #0f0f1a; border-bottom: 1px solid #1e1e2e;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap; row-gap: 8px;
  }
  .brand { font-size: 17px; font-weight: 700; color: #a78bfa; white-space: nowrap; }
  select#persona-select {
    background: #1e1a3a; color: #a78bfa; border: 1px solid #3a2f6b; border-radius: 6px;
    padding: 6px 10px; font-size: 14px; font-weight: 600; cursor: pointer; max-width: 100%;
  }
  .nav-links { display: flex; gap: 14px; margin-left: auto; flex-wrap: wrap; }
  .nav-links a { font-size: 13px; white-space: nowrap; }
  #messages { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: min(640px, 88%); padding: 10px 14px; border-radius: 10px; line-height: 1.45; font-size: 15px; overflow-wrap: break-word; word-break: break-word; }
  .msg.user { align-self: flex-end; background: #2a2450; }
  .msg.assistant { align-self: flex-start; background: #16162a; border: 1px solid #232336; }
  form {
    display: flex; gap: 8px; padding: 12px 16px; background: #0f0f1a; border-top: 1px solid #1e1e2e;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
  }
  input {
    flex: 1; min-width: 0; background: #16162a; border: 1px solid #232336; border-radius: 8px;
    padding: 12px 14px; color: #e8e8f0; font-size: 16px; outline: none;
  }
  input:focus { border-color: #7c3aed; }
  button {
    background: #7c3aed; color: white; border: none; border-radius: 8px;
    padding: 12px 18px; font-weight: 600; cursor: pointer; font-size: 15px;
    min-height: 44px; flex-shrink: 0;
  }
  button:disabled { opacity: 0.5; cursor: default; }
</style>
</head>
<body>
<header>
  <span class="brand">Digital Twin</span>
  <select id="persona-select"><option>loading…</option></select>
  <span class="nav-links">
    <a href="/talk" style="color:#a78bfa;">Talk (voice) →</a>
    <a href="https://github.com/lapat/digital-twin" style="color:#8a8aa0;">GitHub ↗</a>
  </span>
</header>
<div id="messages"></div>
<form id="form">
  <input id="input" autocomplete="off" placeholder="Say something…" />
  <button id="send">Send</button>
</form>

<script>
const sessionId = localStorage.getItem('twinSessionId') ||
  (() => { const id = crypto.randomUUID(); localStorage.setItem('twinSessionId', id); return id; })();

const messagesEl = document.getElementById('messages');
const form = document.getElementById('form');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const personaSelect = document.getElementById('persona-select');

let personaId = null;
let personasById = {};

function addMessage(role, text) {
  const el = document.createElement('div');
  el.className = `msg ${role}`;
  el.textContent = text;
  messagesEl.appendChild(el);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return el;
}

function switchPersona(id) {
  personaId = id;
  messagesEl.innerHTML = '';
  addMessage('assistant', personasById[id].greeting);
}

fetch('/api/personas').then(r => r.json()).then(({ defaultId, personas }) => {
  personasById = Object.fromEntries(personas.map(p => [p.id, p]));
  personaSelect.innerHTML = personas.map(p => `<option value="${p.id}">${p.displayName}</option>`).join('');
  personaSelect.value = defaultId;
  switchPersona(defaultId);
}).catch(() => { personaSelect.innerHTML = '<option>unknown</option>'; });

personaSelect.addEventListener('change', () => switchPersona(personaSelect.value));

// A disabled submit *button* does NOT stop Enter from re-submitting the
// form — that's a browser behavior, not something button.disabled blocks.
// Typing fast and hitting Enter repeatedly fired overlapping /api/chat
// requests on the same session, and the resulting mixed-up concurrent
// streams produced visibly truncated replies. This flag is the actual fix.
let sending = false;

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  if (sending) return;
  const text = input.value.trim();
  if (!text || !personaId) return;
  sending = true;
  addMessage('user', text);
  input.value = '';
  sendBtn.disabled = true;

  const replyEl = addMessage('assistant', '…');
  replyEl.textContent = '';

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, sessionId, personaId }),
    });
    if (res.status === 429) {
      const data = await res.json();
      replyEl.textContent = data.error;
      sendBtn.disabled = false;
      return;
    }
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n\n');
      buffer = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = JSON.parse(line.slice(6));
        if (data.token) replyEl.textContent += data.token;
        if (data.error) replyEl.textContent = `Error: ${data.error}`;
      }
    }
  } catch (err) {
    replyEl.textContent = `Error: ${err.message}`;
  } finally {
    sending = false;
    sendBtn.disabled = false;
    input.focus();
  }
});
</script>
</body>
</html>
