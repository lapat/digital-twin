<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Digital Twin — Meeting Room</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: #0a0a0f; color: #e8e8f0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100vh; height: 100dvh; display: flex; flex-direction: column;
    overflow-x: hidden;
  }
  header {
    padding: 12px 16px; background: #0f0f1a; border-bottom: 1px solid #1e1e2e;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap; row-gap: 8px;
  }
  .brand { font-size: 17px; font-weight: 700; color: #a78bfa; white-space: nowrap; }
  .nav-links { display: flex; gap: 14px; margin-left: auto; flex-wrap: wrap; }
  .nav-links a { font-size: 13px; white-space: nowrap; }
  #setup { padding: 16px; display: flex; flex-direction: column; gap: 16px; max-width: 640px; overflow-y: auto; }
  #participants { display: flex; flex-wrap: wrap; gap: 10px; }
  .persona-check {
    display: flex; align-items: center; gap: 6px; background: #16162a; border: 1px solid #232336;
    border-radius: 8px; padding: 10px 14px; cursor: pointer; font-size: 14px; min-height: 44px;
  }
  .persona-check.checked { border-color: #7c3aed; background: #1e1a3a; }
  input[type="text"] {
    background: #16162a; border: 1px solid #232336; border-radius: 8px;
    padding: 12px 14px; color: #e8e8f0; font-size: 16px; outline: none; width: 100%; min-width: 0;
  }
  input[type="text"]:focus { border-color: #7c3aed; }
  button {
    background: #7c3aed; color: white; border: none; border-radius: 8px;
    padding: 12px 18px; font-weight: 600; cursor: pointer; font-size: 15px; min-height: 44px;
  }
  button:disabled { opacity: 0.5; cursor: default; }
  #messages { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0 16px 16px; display: none; flex-direction: column; gap: 12px; }
  .msg { max-width: min(640px, 88%); padding: 10px 14px; border-radius: 10px; line-height: 1.45; font-size: 15px; background: #16162a; border: 1px solid #232336; overflow-wrap: break-word; word-break: break-word; }
  .msg.human { align-self: flex-end; background: #2a2450; }
  .msg.speaking { border-color: #7c3aed; }
  .msg .speaker { font-size: 12px; font-weight: 700; color: #a78bfa; margin-bottom: 4px; }
  .msg.human .speaker { color: #c4b5fd; }
  .audio-failed-tag {
    display: inline-block; margin-left: 6px; font-size: 10px; font-weight: 600; color: #f0a8a8;
    background: #2e1a1a; border: 1px solid #4a2626; border-radius: 4px; padding: 1px 5px; vertical-align: middle;
  }
  #status { padding: 8px 16px; color: #8a8aa0; font-size: 13px; }
  #interject-bar {
    display: none; gap: 8px; padding: 12px 16px; background: #0f0f1a; border-top: 1px solid #1e1e2e;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
  }
  #interject-bar input { flex: 1; min-width: 0; }
</style>
</head>
<body>
<header>
  <span class="brand">Digital Twin — Meeting Room</span>
  <a href="/brain" style="margin-left:auto;color:#a78bfa;font-size:13px;">Text chat →</a>
</header>

<div id="setup">
  <div>Pick at least 2 personas, then give them a topic to discuss:</div>
  <div id="participants"><em>loading…</em></div>
  <input type="text" id="topic" placeholder="e.g. Should we build the wall or tear it down?" />
  <button id="start-btn" style="align-self:flex-start;">Start meeting</button>
</div>

<div id="status"></div>
<div id="messages"></div>
<form id="interject-bar">
  <input type="text" id="interject-input" placeholder="Jump in — say something and the next speaker will respond to you…" />
  <button id="interject-btn" type="submit">Interject</button>
</form>

<script>
const participantsEl = document.getElementById('participants');
const topicInput = document.getElementById('topic');
const startBtn = document.getElementById('start-btn');
const statusEl = document.getElementById('status');
const messagesEl = document.getElementById('messages');
const setupEl = document.getElementById('setup');
const interjectBar = document.getElementById('interject-bar');
const interjectInput = document.getElementById('interject-input');

let personasById = {};
const selected = new Set();
let currentMeetingId = null;

fetch('/api/personas').then(r => r.json()).then(({ personas }) => {
  // Meeting room turns are paced by real audio playback finishing — a
  // text-only persona (no voice clone) has nothing to pace against, so it
  // doesn't belong in this room. Leave them selectable in /brain and /talk.
  personasById = Object.fromEntries(personas.map(p => [p.id, p]));
  participantsEl.innerHTML = '';
  personas.filter(p => p.voiceAvailable).forEach(p => {
    const el = document.createElement('label');
    el.className = 'persona-check';
    el.innerHTML = `<input type="checkbox" value="${p.id}" style="display:none" /> ${p.displayName}`;
    el.addEventListener('click', (e) => {
      e.preventDefault();
      if (selected.has(p.id)) { selected.delete(p.id); el.classList.remove('checked'); }
      else { selected.add(p.id); el.classList.add('checked'); }
    });
    participantsEl.appendChild(el);
  });
}).catch(() => { participantsEl.textContent = 'Failed to load personas.'; });

function addTurn(speakerName, text, isHuman = false, personaId = null) {
  const el = document.createElement('div');
  el.className = `msg${isHuman ? ' human' : ''}`;
  el.innerHTML = `<div class="speaker"></div><div class="text"></div>`;
  el.querySelector('.speaker').textContent = speakerName;
  el.querySelector('.text').textContent = text;
  messagesEl.appendChild(el);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return el;
}

// TTS failing must never look identical to "no error happened" — a silent
// return here is indistinguishable from playback just not being triggered,
// which is exactly what made a real ElevenLabs/network failure read as an
// unexplained bug instead of a visible, transient error.
function markAudioFailed(el, detail) {
  console.error(`Meeting playback error: ${detail}`);
  if (el.querySelector('.audio-failed-tag')) return;
  const tag = document.createElement('span');
  tag.className = 'audio-failed-tag';
  tag.title = detail;
  tag.textContent = 'AUDIO FAILED';
  el.querySelector('.speaker').appendChild(tag);
}

// Audio playback IS the pacing — waiting for one speaker's line to
// actually finish playing before the next one starts is what makes this
// feel like people talking instead of a text log dumping out instantly.
// A small random beat before starting mimics the natural gap between one
// person finishing and the next one picking up.
//
// Interjecting should cut off whoever's talking immediately rather than
// making you wait them out — stopCurrentTurn is how the interject handler
// reaches into whatever speakTurn is currently doing (the pre-speech pause,
// the /api/speak fetch, or actual audio playback) and ends it right away.
let stopCurrentTurn = null;

// Mobile Safari (and mobile Chrome) only let a <audio> element autoplay
// without a fresh tap if that exact element was already "unlocked" by a
// play() call made directly inside a real user-gesture handler. Creating a
// brand-new Audio() object per turn (the old approach) meant only the
// very first turn — still riding the "Start meeting" tap — was allowed to
// play; every turn after that was a brand-new, un-unlocked element and got
// silently blocked. That exactly matches "first message has audio, every
// one after it doesn't, only on mobile." Fix: one Audio element, unlocked
// once on tap, reused (just swap .src) for every turn all meeting long.
let ttsAudio = null;
const SILENT_WAV = 'data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=';

// Returns the settle promise so callers can await it — reassigning .src on
// this element before the unlock's own play() call has settled aborts that
// pending play() with "AbortError: interrupted by a new load request",
// which speakTurn would otherwise misreport as a real playback failure.
function unlockAudioForMobile() {
  ttsAudio = new Audio(SILENT_WAV);
  const settle = ttsAudio.play()
    .then(() => console.log('[meeting] audio unlocked for mobile playback'))
    .catch((err) => console.warn('[meeting] audio unlock failed (desktop browsers usually don\'t need it):', err.message));
  // On some mobile browsers this play() promise has been observed to never
  // settle at all — a hung unlock must never be able to block the entire
  // meeting from starting. Race it against a hard timeout so the tap
  // always leads somewhere, even if that first turn's audio is skipped.
  const timeout = new Promise((resolve) => setTimeout(() => {
    console.warn('[meeting] audio unlock timed out after 2s — proceeding without it');
    resolve();
  }, 2000));
  return Promise.race([settle, timeout]);
}

async function speakTurn(el, personaId, text) {
  console.log(`[meeting] speakTurn start — persona=${personaId} textLen=${text.length}`);
  let stopped = false;
  stopCurrentTurn = () => { stopped = true; };

  await new Promise(r => setTimeout(r, 250 + Math.random() * 400));
  if (stopped) { stopCurrentTurn = null; return; }

  el.classList.add('speaking');
  try {
    const res = await fetch('/api/speak', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, personaId }),
    });
    console.log(`[meeting] /api/speak for ${personaId} → HTTP ${res.status}`);
    if (stopped) return;
    if (!res.ok) {
      let detail = `HTTP ${res.status}`;
      try { detail = (await res.json()).error || detail; } catch { /* body wasn't JSON */ }
      markAudioFailed(el, detail);
      return;
    }
    const blob = await res.blob();
    if (stopped) return;
    const objectUrl = URL.createObjectURL(blob);
    const audio = ttsAudio || new Audio();
    audio.src = objectUrl;
    // A stalled/broken audio device (play() "succeeds" but onended never
    // fires) must never hang the whole meeting forever — this timeout is
    // the actual safety net, not just an optimization.
    await new Promise((resolve) => {
      const timeout = setTimeout(() => { console.warn(`[meeting] playback for ${personaId} hit the 20s safety timeout without ending`); resolve(); }, 20_000);
      const done = () => { clearTimeout(timeout); URL.revokeObjectURL(objectUrl); resolve(); };
      audio.onended = () => { console.log(`[meeting] playback ended normally for ${personaId}`); done(); };
      audio.onerror = () => { console.warn(`[meeting] audio element error for ${personaId}:`, audio.error); done(); };
      stopCurrentTurn = () => { audio.pause(); done(); };
      audio.play()
        .then(() => console.log(`[meeting] play() resolved for ${personaId}`))
        .catch((err) => {
          console.error(`[meeting] play() REJECTED for ${personaId} — likely a mobile autoplay block:`, err.name, err.message);
          markAudioFailed(el, `Playback blocked: ${err.name} — ${err.message}`);
          done();
        });
    });
  } catch (err) {
    markAudioFailed(el, err.message);
  } finally {
    el.classList.remove('speaking');
    stopCurrentTurn = null;
  }
}

async function runMeeting(meetingId, maxTurns) {
  for (let i = 0; i < maxTurns; i++) {
    statusEl.textContent = `Turn ${i + 1} of ${maxTurns}…`;
    const res = await fetch('/api/meeting/next', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ meetingId }),
    });
    const data = await res.json();
    if (!res.ok) { statusEl.textContent = `Error: ${data.error}`; return; }
    if (data.done && !data.text) break;
    const el = addTurn(data.speakerName, data.text, false, data.speakerId);
    await speakTurn(el, data.speakerId, data.text);
    if (data.done) break;
  }
  statusEl.textContent = 'Meeting ended.';
  interjectBar.style.display = 'none';
}

startBtn.addEventListener('click', async () => {
  const topic = topicInput.value.trim();
  if (selected.size < 2) { statusEl.textContent = 'Pick at least 2 personas.'; return; }
  if (!topic) { statusEl.textContent = 'Give them a topic.'; return; }

  // The play() call itself must happen synchronously inside this click
  // handler — that's what gives mobile browsers permission to keep playing
  // audio through this element for the rest of the meeting. Awaiting its
  // settle afterward is fine (doesn't need to be sync) and avoids the
  // element's first real turn racing the unlock clip's own play() promise.
  await unlockAudioForMobile();

  startBtn.disabled = true;
  setupEl.style.display = 'none';
  messagesEl.style.display = 'flex';
  interjectBar.style.display = 'flex';
  statusEl.textContent = 'Starting…';

  try {
    const res = await fetch('/api/meeting/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ personaIds: [...selected], topic }),
    });
    const data = await res.json();
    if (!res.ok) { statusEl.textContent = `Error: ${data.error}`; return; }
    currentMeetingId = data.meetingId;
    await runMeeting(data.meetingId, data.maxTurns);
  } catch (err) {
    statusEl.textContent = `Error: ${err.message}`;
  }
});

// Fires independently of the turn loop above — the interjection lands in
// the server-side transcript immediately, and whichever /api/meeting/next
// call is next in flight (or about to start) picks it up as the most
// recent line, so the next speaker responds to you directly. Whoever's
// currently talking gets cut off right away (stopCurrentTurn) rather than
// making you wait for them to finish — that's the whole point of being
// able to jump in.
let interjecting = false;
interjectBar.addEventListener('submit', async (e) => {
  e.preventDefault();
  if (interjecting) return;
  const text = interjectInput.value.trim();
  if (!text || !currentMeetingId) return;
  interjecting = true;
  interjectInput.value = '';
  stopCurrentTurn?.();
  try {
    const res = await fetch('/api/meeting/interject', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ meetingId: currentMeetingId, text }),
    });
    if (res.ok) addTurn('You', text, true);
    else { const data = await res.json(); statusEl.textContent = `Error: ${data.error}`; }
  } catch (err) {
    statusEl.textContent = `Error: ${err.message}`;
  } finally {
    interjecting = false;
  }
});
</script>
</body>
</html>
