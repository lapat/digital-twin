<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Digital Twin — Talk</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: #0a0a0f; color: #e8e8f0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100vh; height: 100dvh; display: flex; flex-direction: column;
    overflow-x: hidden;
  }
  header {
    padding: 12px 16px; background: #0f0f1a; border-bottom: 1px solid #1e1e2e;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap; row-gap: 8px;
  }
  .brand { font-size: 17px; font-weight: 700; color: #a78bfa; white-space: nowrap; }
  select#persona-select {
    background: #1e1a3a; color: #a78bfa; border: 1px solid #3a2f6b; border-radius: 6px;
    padding: 6px 10px; font-size: 14px; font-weight: 600; cursor: pointer; max-width: 100%;
  }
  .nav-links { display: flex; gap: 14px; margin-left: auto; flex-wrap: wrap; }
  .nav-links a { font-size: 13px; white-space: nowrap; }
  #messages { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: min(640px, 88%); padding: 10px 14px; border-radius: 10px; line-height: 1.45; font-size: 15px; overflow-wrap: break-word; word-break: break-word; }
  .msg.user { align-self: flex-end; background: #2a2450; }
  .msg.assistant { align-self: flex-start; background: #16162a; border: 1px solid #232336; }
  .msg.assistant.speaking { border-color: #7c3aed; }
  .audio-failed-note { display: block; margin-top: 6px; font-size: 11px; font-weight: 600; color: #f0a8a8; }
  form {
    display: flex; gap: 8px; padding: 12px 16px; background: #0f0f1a; border-top: 1px solid #1e1e2e; align-items: center;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
  }
  input {
    flex: 1; min-width: 0; background: #16162a; border: 1px solid #232336; border-radius: 8px;
    padding: 12px 14px; color: #e8e8f0; font-size: 16px; outline: none;
  }
  input:focus { border-color: #7c3aed; }
  button {
    background: #7c3aed; color: white; border: none; border-radius: 8px;
    padding: 12px 18px; font-weight: 600; cursor: pointer; font-size: 15px;
    min-height: 44px; flex-shrink: 0;
  }
  button:disabled { opacity: 0.5; cursor: default; }
  #mic-btn { width: 44px; height: 44px; padding: 0; border-radius: 50%; font-size: 18px; flex-shrink: 0; }
  #mic-btn.listening { background: #dc2626; animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
  #banner { padding: 10px 16px; background: #241a1a; color: #f3a; font-size: 13px; border-bottom: 1px solid #3a2020; display: none; }
</style>
</head>
<body>
<header>
  <span class="brand">Digital Twin — Talk</span>
  <select id="persona-select"><option>loading…</option></select>
  <span class="nav-links">
    <a href="/brain" style="color:#a78bfa;">Text chat →</a>
    <a href="https://github.com/lapat/digital-twin" style="color:#8a8aa0;">GitHub ↗</a>
  </span>
</header>
<div id="banner"></div>
<div id="messages"></div>
<form id="form">
  <button type="button" id="mic-btn" title="Click to speak, click again when you're done">🎤</button>
  <input id="input" autocomplete="off" placeholder="Type, or click the mic and talk…" />
  <button id="send">Send</button>
</form>

<script>
const sessionId = localStorage.getItem('twinSessionId') ||
  (() => { const id = crypto.randomUUID(); localStorage.setItem('twinSessionId', id); return id; })();

const messagesEl = document.getElementById('messages');
const form = document.getElementById('form');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const micBtn = document.getElementById('mic-btn');
const personaSelect = document.getElementById('persona-select');
const banner = document.getElementById('banner');

let personaId = null;
let personasById = {};
let voiceAvailable = false;

function showBanner(text) {
  banner.textContent = text;
  banner.style.display = 'block';
}
function hideBanner() {
  banner.style.display = 'none';
}

function addMessage(role, text) {
  const el = document.createElement('div');
  el.className = `msg ${role}`;
  el.textContent = text;
  messagesEl.appendChild(el);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return el;
}

function switchPersona(id) {
  personaId = id;
  const p = personasById[id];
  voiceAvailable = p.voiceAvailable;
  messagesEl.innerHTML = '';
  addMessage('assistant', p.greeting);
  hideBanner();
  if (!voiceAvailable) {
    showBanner('This persona has no voice configured (needs ELEVENLABS_API_KEY + a voice). Replies will show as text only.');
  }
  micBtn.disabled = !voiceAvailable || !speechSupported();
}

fetch('/api/personas').then(r => r.json()).then(({ defaultId, personas }) => {
  personasById = Object.fromEntries(personas.map(p => [p.id, p]));
  personaSelect.innerHTML = personas.map(p => `<option value="${p.id}">${p.displayName}</option>`).join('');
  personaSelect.value = defaultId;
  switchPersona(defaultId);
}).catch(() => { personaSelect.innerHTML = '<option>unknown</option>'; });

personaSelect.addEventListener('change', () => switchPersona(personaSelect.value));

function speechSupported() {
  return 'webkitSpeechRecognition' in window || 'SpeechRecognition' in window;
}
if (!speechSupported()) {
  micBtn.title = 'Voice input needs Chrome or Edge';
}

// Mobile Safari/Chrome only let a <audio> element autoplay without a fresh
// tap if that exact element was already "unlocked" by a play() call made
// directly inside a real user-gesture handler. One reused, unlocked
// element (instead of `new Audio()` per reply) keeps every reply playable
// for the rest of the session, on mobile included.
let ttsAudio = null;
let audioUnlocked = false;
const SILENT_WAV = 'data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=';
// Returns the settle promise so callers can await it — reassigning .src on
// this element before the unlock's own play() call has settled aborts that
// pending play() with "AbortError: interrupted by a new load request",
// which playReply would otherwise misreport as a real playback failure.
function unlockAudioForMobile() {
  if (audioUnlocked) return Promise.resolve();
  audioUnlocked = true;
  ttsAudio = new Audio(SILENT_WAV);
  const settle = ttsAudio.play()
    .then(() => console.log('[talk] audio unlocked for mobile playback'))
    .catch((err) => console.warn('[talk] audio unlock failed (desktop browsers usually don\'t need it):', err.message));
  // On some mobile browsers this play() promise has been observed to never
  // settle at all — a hung unlock must never be able to block sending a
  // message. Race it against a hard timeout so the tap always leads
  // somewhere, even if that first reply's audio is skipped.
  const timeout = new Promise((resolve) => setTimeout(() => {
    console.warn('[talk] audio unlock timed out after 2s — proceeding without it');
    resolve();
  }, 2000));
  return Promise.race([settle, timeout]);
}

function markPlaybackFailed(replyEl, detail) {
  console.error(`[talk] playback failed: ${detail}`);
  if (replyEl.querySelector('.audio-failed-note')) return;
  const note = document.createElement('span');
  note.className = 'audio-failed-note';
  note.textContent = `🔇 Audio failed: ${detail}`;
  replyEl.appendChild(note);
}

async function playReply(replyEl, text) {
  if (!voiceAvailable) return;
  replyEl.classList.add('speaking');
  try {
    const res = await fetch('/api/speak', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, personaId }),
    });
    console.log(`[talk] /api/speak → HTTP ${res.status}`);
    if (!res.ok) {
      let detail = `HTTP ${res.status}`;
      try { detail = (await res.json()).error || detail; } catch { /* body wasn't JSON */ }
      markPlaybackFailed(replyEl, detail);
      return;
    }
    const blob = await res.blob();
    const objectUrl = URL.createObjectURL(blob);
    const audio = ttsAudio || new Audio();
    audio.src = objectUrl;
    // A stalled/broken audio device (play() "succeeds" but onended never
    // fires) must never hang the UI forever — this timeout is the actual
    // safety net, not just an optimization.
    await new Promise((resolve) => {
      const timeout = setTimeout(() => { console.warn('[talk] playback hit the 20s safety timeout without ending'); resolve(); }, 20_000);
      const done = () => { clearTimeout(timeout); URL.revokeObjectURL(objectUrl); resolve(); };
      audio.onended = done;
      audio.onerror = () => { console.warn('[talk] audio element error:', audio.error); done(); };
      audio.play()
        .then(() => console.log('[talk] play() resolved'))
        .catch((err) => {
          console.error('[talk] play() REJECTED — likely a mobile autoplay block:', err.name, err.message);
          markPlaybackFailed(replyEl, `${err.name} — ${err.message}`);
          done();
        });
    });
  } catch (err) {
    markPlaybackFailed(replyEl, err.message);
  } finally {
    replyEl.classList.remove('speaking');
  }
}

// A disabled submit *button* does NOT stop Enter from re-submitting the
// form — typing fast and hitting Enter repeatedly (or talking again before
// the reply finished) fired overlapping /api/chat requests on the same
// session, and the resulting mixed-up concurrent streams produced visibly
// truncated replies. This flag is the actual fix, covering both the
// text-input and voice-input entry points since both call sendMessage().
let sending = false;

async function sendMessage(text) {
  if (sending || !text || !personaId) return;
  sending = true;
  addMessage('user', text);
  input.value = '';
  sendBtn.disabled = true;

  const replyEl = addMessage('assistant', '…');
  replyEl.textContent = '';

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, sessionId, personaId }),
    });
    if (res.status === 429) {
      const data = await res.json();
      replyEl.textContent = data.error;
      return;
    }
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let fullReply = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n\n');
      buffer = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = JSON.parse(line.slice(6));
        if (data.token) { fullReply += data.token; replyEl.textContent += data.token; }
        if (data.error) replyEl.textContent = `Error: ${data.error}`;
      }
    }
    if (fullReply) await playReply(replyEl, fullReply);
  } catch (err) {
    replyEl.textContent = `Error: ${err.message}`;
  } finally {
    sending = false;
    sendBtn.disabled = false;
    input.focus();
  }
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  await unlockAudioForMobile();
  sendMessage(input.value.trim());
});

// ── Voice input (Web Speech API — free, built into Chrome/Edge) ────────────

// continuous=false (the old setting) let the browser's own silence
// detection decide when you're "done" talking and cut the mic — a normal
// mid-sentence pause reads as the end of speech. continuous=true keeps
// listening across pauses; the user explicitly taps the mic again to say
// "I'm done," instead of the API guessing.
let recognition = null;
let listening = false;
let finalTranscript = '';

if (speechSupported()) {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  recognition.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const transcript = e.results[i][0].transcript;
      if (e.results[i].isFinal) finalTranscript += transcript + ' ';
      else interim += transcript;
    }
    input.value = (finalTranscript + interim).trim();
  };

  const stopListening = () => {
    listening = false;
    micBtn.classList.remove('listening');
    recognition.stop();
    const text = (finalTranscript + input.value).trim() ? input.value.trim() : '';
    finalTranscript = '';
    if (text) sendMessage(text);
  };

  recognition.onerror = () => { listening = false; micBtn.classList.remove('listening'); };
  // Some browsers still end the session on their own after a long silence
  // even in continuous mode — treat that the same as tapping stop, so
  // whatever was said gets sent instead of silently dropped.
  recognition.onend = () => { if (listening) stopListening(); };

  micBtn.addEventListener('click', async () => {
    if (listening) { stopListening(); return; }
    await unlockAudioForMobile();
    listening = true;
    finalTranscript = '';
    input.value = '';
    micBtn.classList.add('listening');
    recognition.start();
  });
}
</script>
</body>
</html>
